spring:
  application:
    name: hiresync-core
  threads:
    virtual:
      enabled: true  # Java 21 virtual threads

  # ---- Database ----
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:hiresync}
    username: ${POSTGRES_USER:hiresync}
    password: ${POSTGRES_PASSWORD:hiresync_local_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ---- Kafka ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false   # CRITICAL: prevents ClassNotFoundException on consumers
        linger.ms: 5
        batch.size: 16384
    consumer:
      group-id: core-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.hiresync.common.events"
        spring.json.value.default.type: "com.hiresync.common.events.KafkaEvent"

  # ---- Mail ----
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  # ---- File Upload ----
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# ---- Server ----
server:
  port: ${CORE_SERVICE_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

# ---- Security / JWT ----
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-min-256-bits}
    expiry-ms: ${JWT_EXPIRY_MS:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:./uploads}

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans

# ---- OpenAPI ----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

# ---- Logging ----
logging:
  level:
    com.hiresync: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
