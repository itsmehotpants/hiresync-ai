name: HireSync AI — CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hiresync_test
          POSTGRES_USER: hiresync
          POSTGRES_PASSWORD: hiresync_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=hiresync_test psql -h localhost -U hiresync -d hiresync_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Build with Maven (skip tests for speed)
        run: mvn -B install -DskipTests --no-transfer-progress
        env:
          # Dummy values for CI — no real secrets
          JWT_SECRET: ci-test-secret-key-minimum-32-bytes-long
          GEMINI_API_KEY: dummy-not-used-in-unit-tests
          POSTGRES_PASSWORD: hiresync_test
          POSTGRES_DB: hiresync_test
          POSTGRES_USER: hiresync

      - name: Run unit tests
        run: mvn -B test --no-transfer-progress
        env:
          JWT_SECRET: ci-test-secret-key-minimum-32-bytes-long
          GEMINI_API_KEY: dummy-not-used-in-unit-tests
          POSTGRES_PASSWORD: hiresync_test
          POSTGRES_DB: hiresync_test
          POSTGRES_USER: hiresync

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hiresync-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hiresync-frontend

      - name: Build frontend
        run: npm run build
        working-directory: hiresync-frontend
        env:
          VITE_API_URL: http://localhost:8081
          VITE_AI_SERVICE_URL: http://localhost:8082
