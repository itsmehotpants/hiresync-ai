services:

  # ============================================================
  # PostgreSQL 16 with pgvector extension
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hiresync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiresync}
      POSTGRES_USER: ${POSTGRES_USER:-hiresync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hiresync_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiresync} -d ${POSTGRES_DB:-hiresync}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Redis 7.2 — Cache + Chat Memory + Sessions
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: hiresync-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ============================================================
  # Apache Kafka 3.7 in KRaft mode (no Zookeeper!)
  # ============================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: hiresync-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    ports:
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 700M

  # ============================================================
  # Kafka UI — Visual management at http://localhost:9090
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hiresync-kafka-ui
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: hiresync-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 300M

  # ============================================================
  # MailHog — Fake SMTP for local email testing
  # Web UI at http://localhost:8025
  # ============================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hiresync-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    deploy:
      resources:
        limits:
          memory: 100M

  # ============================================================
  # Zipkin — Distributed tracing at http://localhost:9411
  # ============================================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: hiresync-zipkin
    ports:
      - "9411:9411"
    deploy:
      resources:
        limits:
          memory: 300M

volumes:
  postgres-data:
  redis-data:
  kafka-data:
